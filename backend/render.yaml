services:
  - type: web
    name: comment-intelligence-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: BILIBILI_COOKIE
        sync: false
      - key: CORS_ORIGINS
        # 允许的域名列表，逗号分隔
        # 生产环境需要包含你的 Vercel 前端地址
        value: https://comment-intelligence-studio-zhangjie12500s-projects.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: PYTHON_VERSION
        value: "3.11"
